<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cometa Neón Suave</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    cursor:default;
    font-family:'Segoe UI', sans-serif;
}
canvas{ display:block; }

#ui{
    position:absolute;
    top:20px;
    left:20px;
    display:none;
    gap:10px;
    z-index:10;
}
input{
    background:#000;
    border:1px solid #00eaff;
    color:#00eaff;
    padding:8px;
    border-radius:4px;
}
button{
    background:#00eaff;
    border:none;
    padding:8px 20px;
    cursor:pointer;
    font-weight:bold;
}

/* BOTÓN ENTRAR */
#enterBtn{
    position:absolute;
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:12px 30px;
    background:transparent;
    border:1px solid #00eaff;
    color:#00eaff;
    font-size:18px;
    cursor:pointer;
    display:none;
    z-index:10;
}
</style>
</head>
<body>

<div id="ui">
    <input type="text" id="nameInput" placeholder="Nombre..." maxlength="12">
    <button onclick="formName()">¡PAM!</button>
</div>

<button id="enterBtn" onclick="enterApp()">Entrar</button>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const offCanvas = document.createElement("canvas");
const offCtx = offCanvas.getContext("2d");

let width, height;
let particles = [];
let mouse = { x:0, y:0, angle:0, lastX:0, lastY:0 };
let mode = "intro";

const MIN_DIST = 8;
const INFLUENCE_RADIUS = 180;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    offCanvas.width = width;
    offCanvas.height = height;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", e=>{
    let dx = e.clientX - mouse.lastX;
    let dy = e.clientY - mouse.lastY;

    mouse.x = e.clientX;
    mouse.y = e.clientY;

    if(Math.abs(dx)>0.1 || Math.abs(dy)>0.1){
        mouse.angle = Math.atan2(dy, dx);
    }

    mouse.lastX = mouse.x;
    mouse.lastY = mouse.y;
});

document.getElementById("nameInput").addEventListener("keydown", e=>{
    if(e.key==="Enter") formName();
});

class Particle{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.size = Math.random()*1.5 + 0.5;
        this.targetX = null;
        this.targetY = null;
    }

    update(){

        // INTRO / TEXTO
        if((mode==="intro" || mode==="text") && this.targetX!==null){
            this.x += (this.targetX - this.x)*0.08;
            this.y += (this.targetY - this.y)*0.08;
            return;
        }

        // 🔥 ATRACCIÓN SOLO POR UN LADO (cola)
        if(mode==="follow"){
            let dx = this.x - mouse.x;
            let dy = this.y - mouse.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < INFLUENCE_RADIUS){

                let angleToParticle = Math.atan2(dy, dx);
                let diff = angleToParticle - mouse.angle;

                while(diff > Math.PI) diff -= Math.PI*2;
                while(diff < -Math.PI) diff += Math.PI*2;

                // SOLO DETRÁS
                if(Math.abs(diff) > 1.5){
                    let backX = mouse.x - Math.cos(mouse.angle)*150;
                    let backY = mouse.y - Math.sin(mouse.angle)*150;

                    let force = (INFLUENCE_RADIUS - dist)/INFLUENCE_RADIUS;

                    this.vx += (backX - this.x) * 0.015 * force;
                    this.vy += (backY - this.y) * 0.015 * force;
                }
            }

            this.vx *= 0.96;
            this.vy *= 0.96;

            this.x += this.vx;
            this.y += this.vy;
        }
    }

    draw(){
        ctx.fillStyle="#00eaff";
        ctx.shadowBlur=8;
        ctx.shadowColor="#00eaff";
        ctx.fillRect(this.x,this.y,this.size,this.size);
    }
}

// GENERAR TEXTO
function generateText(text){
    offCtx.clearRect(0,0,width,height);

    offCtx.fillStyle="white";
    offCtx.font=`bold ${Math.min(width/text.length,200)}px Arial`;
    offCtx.textAlign="center";
    offCtx.textBaseline="middle";
    offCtx.fillText(text,width/2,height/2);

    const data = offCtx.getImageData(0,0,width,height).data;
    let coords=[];

    for(let y=0;y<height;y+=4){
        for(let x=0;x<width;x+=4){
            if(data[(y*width+x)*4+3]>128){
                coords.push({x,y});
            }
        }
    }

    particles=[];
    coords.forEach(pt=>{
        let p=new Particle(Math.random()*width,Math.random()*height);
        p.targetX=pt.x;
        p.targetY=pt.y;
        particles.push(p);
    });
}

// INTRO
function introSequence(){
    generateText("Hola");

    setTimeout(()=>{
        // dispersión
        particles.forEach(p=>{
            p.targetX=null;
            p.vx=(Math.random()-0.5)*4;
            p.vy=(Math.random()-0.5)*4;
        });

        setTimeout(()=>{
            generateText("Bienvenides");

            setTimeout(()=>{
                document.getElementById("enterBtn").style.display="block";
            },1500);

        },1000);

    },1500);
}

function enterApp(){
    document.getElementById("enterBtn").style.display="none";
    document.getElementById("ui").style.display="flex";
    mode="follow";
}

// TU FUNCIÓN ORIGINAL
function formName(){
    const text = document.getElementById("nameInput").value.trim();
    if(!text){ mode="follow"; return; }

    generateText(text);
    mode="text";
}

// separación suave (original)
function separateParticles(){
    for(let i=0;i<particles.length;i++){
        for(let j=i+1;j<particles.length;j++){
            let dx=particles[j].x-particles[i].x;
            let dy=particles[j].y-particles[i].y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<MIN_DIST && dist>0){
                let force=(MIN_DIST-dist)/dist * 0.02;
                let fx=dx*force;
                let fy=dy*force;

                particles[i].vx -= fx;
                particles[i].vy -= fy;
                particles[j].vx += fx;
                particles[j].vy += fy;
            }
        }
    }
}

// INIT
function initParticles(count=1200){
    particles=[];
    for(let i=0;i<count;i++){
        particles.push(new Particle(
            Math.random()*width,
            Math.random()*height
        ));
    }
}
initParticles();

function animate(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,width,height);

    particles.forEach(p=>p.update());
    separateParticles();
    particles.forEach(p=>p.draw());

    requestAnimationFrame(animate);
}

introSequence();
animate();
</script>

</body>
</html>
